<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>mluona IPTV - Dashboard</title>
    <link rel="stylesheet" href="../assets/base.css">
    <link rel="stylesheet" href="../assets/home.css">
</head>
<body>
    <div class="dashboard">
        <header class="header">
            <div class="logo">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px;">
                  <polygon points="5 3 19 12 5 21 5 3"></polygon>
                  <polygon points="9 7 15 12 9 17 9 7" fill="var(--primary)"></polygon>
                </svg>
                <div style="display: flex; flex-direction: column; align-items: flex-start; line-height: 1;">
                    <span>mluona</span>
                    <span class="text-primary" style="font-size: 16px; font-weight: 500;">IPTV</span>
                </div>
            </div>
            <div class="time-container">
                <div class="time" id="clock">00:00</div>
                <div class="date" id="date">Thursday, Jan 01, 2025</div>
            </div>
            <div class="actions">
                <button id="btn-search" class="icon-btn focusable"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg></button>
                <button id="btn-refresh" class="icon-btn focusable"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path></svg></button>
                <button id="btn-settings" class="icon-btn focusable"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg></button>
                <button id="btn-profile" class="icon-btn focusable"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg></button>
                <button class="icon-btn focusable" onclick="localStorage.clear(); window.location.href='../index.html'"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18.36 6.64a9 9 0 1 1-12.73 0"></path><line x1="12" y1="2" x2="12" y2="12"></line></svg></button>
            </div>
        </header>
        
        <div class="grid">
            <div class="card focusable live-tv" onclick="window.location.href='./livetv.html'">
                <div class="icon-placeholder text-primary" style="margin-bottom: 20px;">
                    <svg width="120" height="120" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                      <rect x="2" y="7" width="20" height="14" rx="2" ry="2"></rect>
                      <polyline points="17 2 12 7 7 2"></polyline>
                      <polygon points="9 11 14 14 9 17 9 11" fill="var(--primary)"></polygon>
                      <circle cx="18" cy="11" r="1" fill="var(--primary)" stroke="none"></circle>
                      <circle cx="18" cy="14" r="1" fill="var(--primary)" stroke="none"></circle>
                      <circle cx="18" cy="17" r="1" fill="var(--primary)" stroke="none"></circle>
                    </svg>
                </div>
                <h2>Live TV</h2>
            </div>
            <div class="card-col">
                <div class="card-row">
                    <div class="card focusable flex-1" onclick="window.location.href='./vod.html'">
                        <div class="icon-placeholder text-primary" style="margin-bottom: 10px;">
                            <svg width="100" height="100" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                              <circle cx="12" cy="12" r="10"></circle>
                              <polygon points="10 8 16 12 10 16 10 8" fill="var(--primary)"></polygon>
                            </svg>
                        </div>
                        <h3>Movies</h3>
                    </div>
                    <div class="card focusable flex-1" onclick="window.location.href='./series.html'">
                        <div class="icon-placeholder text-primary" style="margin-bottom: 10px;">
                            <svg width="100" height="100" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                              <rect x="2" y="9" width="20" height="13" rx="2"></rect>
                              <path d="M2 9l4-5h16l-4 5"></path>
                              <line x1="6" y1="4" x2="8" y2="9"></line>
                              <line x1="10" y1="4" x2="12" y2="9"></line>
                              <line x1="14" y1="4" x2="16" y2="9"></line>
                            </svg>
                        </div>
                        <h3>Series</h3>
                    </div>
                </div>
                <div class="card-row small-cards">
                    <div class="card focusable flex-1 small-card flex-row" onclick="window.location.href='./catchup.html'" style="flex-direction: row;">
                        <div class="icon-placeholder text-primary" style="margin-right: 15px;">
                            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                              <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path>
                              <path d="M3 3v5h5"></path>
                              <polygon points="10 9 15 12 10 15 10 9"></polygon>
                            </svg>
                        </div>
                        <h4>Catch Up</h4>
                    </div>
                    <div class="card focusable flex-1 small-card flex-row" style="flex-direction: row;">
                        <div class="icon-placeholder text-primary" style="margin-right: 15px;">
                            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                              <path d="M4 20h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.93a2 2 0 0 1-1.66-.9l-1.82-2.7A2 2 0 0 0 8.93 2H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2z"></path>
                              <path d="M12 16c2-2 4-3.5 4-5a2.5 2.5 0 0 0-5-1 2.5 2.5 0 0 0-5 1c0 1.5 2 3 4 5z"></path>
                            </svg>
                        </div>
                        <h4>Favorites</h4>
                    </div>
                    <div class="card focusable flex-1 small-card flex-row" style="flex-direction: row;">
                        <div class="icon-placeholder text-primary" style="margin-right: 15px;">
                            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                              <path d="M4 20h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.93a2 2 0 0 1-1.66-.9l-1.82-2.7A2 2 0 0 0 8.93 2H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2z"></path>
                              <polygon points="10 10 15 13 10 16 10 10"></polygon>
                            </svg>
                        </div>
                        <h4>Playlists</h4>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="footer-info" style="align-items: center;">
            <div style="display: flex; align-items: center;">
                <div class="icon-btn" style="width: 50px; height: 50px; border-radius: 12px; margin-right: 20px; flex-shrink: 0;">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                      <polyline points="14 2 14 8 20 8"></polyline>
                      <line x1="16" y1="13" x2="8" y2="13"></line>
                      <line x1="16" y1="17" x2="8" y2="17"></line>
                      <polyline points="10 9 9 9 8 9"></polyline>
                    </svg>
                </div>
                <div>
                    <p><span class="text-primary">Current Playlist:</span> <span id="playlist-name">Demo Content</span></p>
                    <p><span class="text-primary">Playlist Expiration Date:</span> <span id="playlist-exp">01-01-70</span></p>
                </div>
            </div>
            <div style="font-weight: bold; color: var(--text-secondary);">V:1.0.3</div>
        </div>
    </div>
    
    <!-- Profile Overlay -->
    <div id="profile-overlay" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 100; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(5px);">
        <div style="background: var(--surface); border: 2px solid var(--border); padding: 50px; border-radius: 20px; text-align: center; width: 500px;">
            <div style="width: 100px; height: 100px; background: var(--primary); border-radius: 50px; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; color: black;">
                <svg width="50" height="50" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            </div>
            <h2 id="profile-name" style="font-size: 32px; margin: 0 0 10px;">Username</h2>
            <p style="font-size: 20px; color: var(--text-secondary); margin: 0 0 30px;">Status: <span id="profile-status" class="text-primary">Active</span></p>
            <div style="text-align: left; background: rgba(255,255,255,0.05); padding: 20px; border-radius: 12px; margin-bottom: 30px;">
                <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                    <span style="color: #aaa;">Created:</span>
                    <strong id="profile-created">N/A</strong>
                </div>
                <div style="display: flex; justify-content: space-between;">
                    <span style="color: #aaa;">Expires:</span>
                    <strong id="profile-expires">N/A</strong>
                </div>
            </div>
            <button id="close-profile-btn" class="focusable" style="padding: 15px 40px; background: var(--primary); color: black; border: none; border-radius: 30px; font-size: 22px; font-weight: bold; cursor: pointer;">Close</button>
        </div>
    </div>
    
    <script src="../js/dpad.js"></script>
    <script src="../js/home.js"></script>
    <script>
        document.addEventListener('tvBackButton', () => {
            window.location.href = '../index.html';
        });
    </script>
</body>
</html>
